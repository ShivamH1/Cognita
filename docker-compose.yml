services:
  postgres:
    image: postgres:16-alpine
    container_name: cognita-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cognita
      POSTGRES_PASSWORD: cognita
      POSTGRES_DB: cognita
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognita -d cognita"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognita-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: cognita-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
